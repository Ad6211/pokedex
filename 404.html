<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>404 - Page introuvable</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #1a1a1a, #2c3e50);
    font-family: 'Press Start 2P', cursive;
    color: white;
    text-align: center;
}

.container {
    max-width: 600px;
    padding: 20px;
}

h1 {
    font-size: 40px;
    color: #ffcc00;
    text-shadow: 3px 3px 0 #000;
}

p {
    font-size: 12px;
    line-height: 1.8;
}

.pokemon {
    margin-top: 20px;
}

.pokemon img {
    width: 180px;
    image-rendering: pixelated;
}

.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 10px 15px;
    background: #ffcc00;
    color: black;
    text-decoration: none;
    border-radius: 10px;
    font-size: 10px;
    box-shadow: 3px 3px 0 #000;
}

.btn:hover {
    background: #fff;
}
</style>
</head>

<body>

<div class="container">

    <h1>404</h1>
    <p>Oups… cette page s’est échappée dans les hautes herbes !</p>

    <p>Un Pokémon sauvage apparaît…</p>

    <div class="pokemon">
        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/404.png" alt="Pokémon 404">
        <p>#404 - Luxray</p>
    </div>

    <a class="btn" href="index.html">Retour au Pokédex</a>

</div>

</body>
</html>
